<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · Nota de Proceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow-sm p-6">
    <h1 class="text-2xl font-bold text-slate-800 text-center">Nota de Proceso</h1>
    <p class="text-slate-500 text-sm text-center mt-1">Ingreso seguro con Google</p>

    <div class="mt-6 space-y-3">
      {% if google_enabled %}
      <a href="{{ url_for('auth_google') }}" class="w-full inline-flex items-center justify-center gap-2 bg-white border border-slate-300 rounded-lg py-2.5 px-4 hover:bg-slate-50">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.73 1.22 9.24 3.6l6.9-6.9C35.95 2.64 30.43.5 24 .5 14.62.5 6.51 5.86 2.56 13.69l8.03 6.24C12.51 13.73 17.79 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.57-.14-2.87-.44-4.23H24v8.01h12.97c-.26 2.05-1.68 5.13-4.84 7.2l7.76 6.01c4.65-4.29 7.61-10.61 7.61-17z"/>
          <path fill="#FBBC05" d="M10.59 28.07A14.64 14.64 0 0 1 9.8 24c0-1.4.25-2.76.69-4.07l-8.03-6.24A23.52 23.52 0 0 0 .5 24c0 3.77.9 7.34 2.49 10.31l7.6-6.24z"/>
          <path fill="#34A853" d="M24 47.5c6.43 0 11.95-2.14 15.93-5.85l-7.76-6.01c-2.08 1.45-4.84 2.36-8.17 2.36-6.21 0-11.49-4.23-13.41-10.43l-7.6 6.24C6.51 42.14 14.62 47.5 24 47.5z"/>
        </svg>
        <span class="text-sm font-semibold text-slate-700">Continuar con Google</span>
      </a>
      {% else %}
      <div class="w-full bg-amber-50 border border-amber-200 text-amber-700 text-sm rounded-lg p-3">
        Google OAuth no está configurado. Define <b>GOOGLE_CLIENT_ID</b> y <b>GOOGLE_CLIENT_SECRET</b> en Railway.
      </div>
      {% endif %}
    </div>

    <p class="text-xs text-slate-400 text-center mt-5">Solo usuarios autorizados (admin y colaborador) pueden acceder.</p>
  </div>
</body>
</html>
